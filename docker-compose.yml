version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: webcrawler_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: webcrawler_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webcrawler
    ports:
      - "5432:5432"
    restart: unless-stopped
